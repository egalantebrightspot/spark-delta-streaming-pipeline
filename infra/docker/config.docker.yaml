# Docker environment configuration overlay.
# Mirrors pipeline/common/config.yaml with container-absolute paths.
# Loaded via PIPELINE_CONFIG_PATH=/app/config.docker.yaml (set in Dockerfile).

app:
  name: distributed-data-pipeline
  environment: docker

paths:
  bronze_input: /app/data/bronze_input
  delta_bronze: /app/data/delta/bronze
  delta_silver: /app/data/delta/silver
  delta_gold:   /app/data/delta/gold
  checkpoints:  /app/data/delta/checkpoints

spark:
  master: "spark://spark-master:7077"
  app_name: iot-telemetry-pipeline-docker
  log_level: WARN
  shuffle_partitions: 4
  driver_memory: 2g
  timezone: UTC
  adaptive_enabled: true
  delta_auto_merge: true

streaming:
  trigger_interval: 10 seconds
  max_files_per_trigger: 100
  output_mode: append

generator:
  batch_size: 20
  interval_seconds: 5
  num_devices: 50
  anomaly_probability: 0.05

quality:
  max_temperature: 150.0
  min_temperature: -50.0
  max_humidity: 100.0
  min_humidity: 0.0
  max_pressure: 1100.0
  min_pressure: 900.0
  dedup_window_hours: 24
  expected:
    temperature:
      mean: 22.0
      stddev: 5.0
    humidity:
      mean: 55.0
      stddev: 10.0
    pressure:
      mean: 1013.25
      stddev: 10.0
  scoring:
    anomaly_penalty: 0.9
    optional_fields:
      - temperature
      - humidity
      - pressure
      - battery_level
      - location
      - firmware_version

gold:
  window_duration: 1 hour
  health_weights:
    quality: 0.4
    anomaly_rate: 0.3
    battery: 0.3
  risk_tiers:
    healthy: 0.8
    warning: 0.5

logging:
  root_level: INFO
  log_dir: /app/logs
  max_bytes: 10485760
  backup_count: 5
  console:
    enabled: true
    level: INFO
  file:
    enabled: true
    level: DEBUG
  layers:
    bronze: DEBUG
    silver: INFO
    gold: INFO
    generator: INFO
    monitoring: INFO

monitoring:
  metrics_interval_seconds: 30
  dashboard_port: 8050
