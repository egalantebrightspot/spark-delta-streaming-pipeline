services:

  # ── Spark Cluster ──────────────────────────────────────────────────────────

  spark-master:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: spark-master
    command: ["master"]
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
    ports:
      - "8080:8080"   # Master Web UI
      - "7077:7077"   # Cluster manager port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - pipeline-data:/app/data
      - pipeline-logs:/app/logs
    networks:
      - spark-net
    deploy:
      resources:
        limits:
          memory: 1g

  spark-worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    # No container_name — allows scaling with --scale spark-worker=N
    command: ["worker"]
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_WEBUI_PORT: "8081"
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - pipeline-data:/app/data
      - pipeline-logs:/app/logs
    networks:
      - spark-net
    deploy:
      resources:
        limits:
          memory: 1.5g

  # ── Pipeline Layers (activated with: docker compose --profile pipeline ...) ─

  bronze:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: spark-bronze
    command: ["bronze"]
    environment:
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - pipeline-data:/app/data
      - pipeline-logs:/app/logs
    networks:
      - spark-net
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          memory: 2g

  silver:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: spark-silver
    command: ["silver"]
    environment:
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - pipeline-data:/app/data
      - pipeline-logs:/app/logs
    networks:
      - spark-net
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          memory: 2g

  gold:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: spark-gold
    command: ["gold"]
    environment:
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - pipeline-data:/app/data
      - pipeline-logs:/app/logs
    networks:
      - spark-net
    profiles:
      - pipeline
    deploy:
      resources:
        limits:
          memory: 2g

  # ── Data Generator (activated with: docker compose --profile run ...) ──────

  generator:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: spark-generator
    command: ["generator"]
    volumes:
      - pipeline-data:/app/data
      - pipeline-logs:/app/logs
    networks:
      - spark-net
    profiles:
      - run

  # ── Full Pipeline (activated with: docker compose --profile run ...) ───────

  pipeline:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: spark-pipeline
    command: ["pipeline"]
    environment:
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - pipeline-data:/app/data
      - pipeline-logs:/app/logs
    networks:
      - spark-net
    profiles:
      - run
    deploy:
      resources:
        limits:
          memory: 3g

  # ── Interactive Tools ──────────────────────────────────────────────────────

  dashboard:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: spark-dashboard
    command: ["dashboard"]
    ports:
      - "8050:8050"
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - pipeline-data:/app/data
      - pipeline-logs:/app/logs
    networks:
      - spark-net
    profiles:
      - tools

  live-monitor:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: spark-live-monitor
    command: ["python", "-m", "monitoring.live_dashboard", "--port", "8050"]
    environment:
      PYSPARK_PYTHON: /opt/bitnami/python/bin/python3
      PYSPARK_DRIVER_PYTHON: /opt/bitnami/python/bin/python3
    ports:
      - "8051:8050"
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - pipeline-data:/app/data
      - pipeline-logs:/app/logs
    networks:
      - spark-net
    profiles:
      - tools

  jupyter:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: spark-jupyter
    command: ["jupyter"]
    ports:
      - "8888:8888"
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - pipeline-data:/app/data
      - pipeline-logs:/app/logs
      - ../../notebooks:/app/notebooks
    networks:
      - spark-net
    profiles:
      - tools
    deploy:
      resources:
        limits:
          memory: 1g

# ── Infrastructure ───────────────────────────────────────────────────────────

volumes:
  pipeline-data:
    driver: local
  pipeline-logs:
    driver: local

networks:
  spark-net:
    driver: bridge
    name: spark-pipeline-net
